apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: iommufd-device-plugin
  namespace: kube-system
  labels:
    app: iommufd-device-plugin
spec:
  selector:
    matchLabels:
      app: iommufd-device-plugin
  updateStrategy:
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: iommufd-device-plugin
    spec:
      priorityClassName: system-node-critical
      tolerations:
        - key: node-role.kubernetes.io/control-plane
          operator: Exists
          effect: NoSchedule
        - key: node-role.kubernetes.io/master
          operator: Exists
          effect: NoSchedule
      containers:
        - name: iommufd-device-plugin
          image: quay.io/vladikr/iommufd-device-plugin:latest
          args:
            - "-log-level=info"
            - "-socket-dir=/var/run/kubevirt/fd-sockets"
          securityContext:
            privileged: true
          volumeMounts:
            - name: device-plugins
              mountPath: /var/lib/kubelet/device-plugins
            - name: dev
              mountPath: /dev
            - name: fd-sockets
              mountPath: /var/run/kubevirt/fd-sockets
      volumes:
        - name: device-plugins
          hostPath:
            path: /var/lib/kubelet/device-plugins
        - name: dev
          hostPath:
            path: /dev
        - name: fd-sockets
          hostPath:
            path: /var/run/kubevirt/fd-sockets
            type: DirectoryOrCreate
